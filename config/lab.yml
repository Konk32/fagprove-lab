# =============================================================================
# lab.yml — Sentral konfigurasjon for hele lab-miljoet
# =============================================================================
# Dette er den ene filen du tilpasser. Alt annet i repoet leser herfra.
# =============================================================================

# -----------------------------------------------------------------------------
# Domene
# -----------------------------------------------------------------------------
domain:
  fqdn: corp.lab.local              # Full DNS-navn for domenet
  netbios: CORPLAB                  # NetBIOS-navn (15 tegn maks, store bokstaver)
  safe_mode_password: "DSRMPass123!"  # DSRM-passord — bytt FOR PRODUKSJON

# -----------------------------------------------------------------------------
# Lokal admin-passord pa klonene
# -----------------------------------------------------------------------------
# Brukes av Ansible for forste tilkobling til hver klone via WinRM,
# for AD er promotert. Ma matche passordet i base-imaget (Lab123).
local_admin:
  username: Administrator
  password: "Lab123"

# -----------------------------------------------------------------------------
# Nettverk
# -----------------------------------------------------------------------------
# LAN-segmentet er isolert — ingen DHCP, ingen internett.
# Du ma opprette segmentet 'lab-fagprove' manuelt i Workstation.
# Se docs/lan-segment-setup.md for instruksjoner.
network:
  lan_segment: Vmnet2
  subnet: 10.50.0.0/24
  netmask: 255.255.255.0
  gateway: 10.50.0.1                # IKKE i bruk enn — placeholder for ruter-VM

# -----------------------------------------------------------------------------
# DHCP — installeres pa DC01 av Ansible
# -----------------------------------------------------------------------------
dhcp:
  scope_name: "Lab-Klienter"
  start_range: 10.50.0.100
  end_range: 10.50.0.200
  subnet_mask: 255.255.255.0
  lease_duration_hours: 8

# -----------------------------------------------------------------------------
# Servere
# -----------------------------------------------------------------------------
# Hver server far en VM klonet fra Packer-basen.
# 'roles' bestemmer hvilke Ansible-roller som kjorer mot serveren.
servers:
  - hostname: DC01
    ip: 10.50.0.10
    cpus: 2
    memory_mb: 4096
    roles:
      - domain-controller
      - dhcp-server

  - hostname: FS01
    ip: 10.50.0.20
    cpus: 2
    memory_mb: 2048
    roles:
      - domain-member
      - file-server

# -----------------------------------------------------------------------------
# Organisasjons-enheter (OU-er)
# -----------------------------------------------------------------------------
organizational_units:
  - name: Brukere
    children:
      - Tjeneste
      - Vanlig
  - name: Servere
  - name: Klienter
  - name: Grupper

# -----------------------------------------------------------------------------
# Sikkerhetsgrupper
# -----------------------------------------------------------------------------
security_groups:
  - name: g_fileshare_read
    ou: Grupper
    scope: Global
  - name: g_fileshare_write
    ou: Grupper
    scope: Global

# -----------------------------------------------------------------------------
# Brukere
# -----------------------------------------------------------------------------
users:
  - username: ola.nordmann
    given_name: Ola
    surname: Nordmann
    ou: Brukere/Vanlig
    initial_password: "Velkommen2026!"
    must_change_password: true
    groups:
      - g_fileshare_read

  - username: kari.hansen
    given_name: Kari
    surname: Hansen
    ou: Brukere/Vanlig
    initial_password: "Velkommen2026!"
    must_change_password: true
    groups:
      - g_fileshare_write

# -----------------------------------------------------------------------------
# Group Policy Objects (kommer i senere ansible-rolle)
# -----------------------------------------------------------------------------
gpo:
  - name: "Baseline-Passord-NSM"
    target_ou: ""                   # Tomt = link til domain root
    settings:
      min_password_length: 14
      password_history: 24
      max_password_age_days: 365
      lockout_threshold: 5
      lockout_duration_minutes: 15
