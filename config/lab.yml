# Main lab configuration. Most deployment behavior is driven from this file.
domain:
  fqdn: corp.lab.local
  netbios: CORPLAB
  safe_mode_password: "DSRMPass123!"

# Used for initial WinRM connection before domain promotion.
local_admin:
  username: Administrator
  password: "Lab123"

# Must match your VMware Workstation network setup.
network:
  lan_segment: Vmnet2
  subnet: 10.50.0.0/24
  netmask: 255.255.255.0
  gateway: 10.50.0.1

dhcp:
  scope_name: "Lab-Klienter"
  start_range: 10.50.0.100
  end_range: 10.50.0.200
  subnet_mask: 255.255.255.0
  lease_duration_hours: 8

servers:
  - hostname: DC01
    ip: 10.50.0.10
    cpus: 2
    memory_mb: 4096
    roles:
      - domain-controller
      - dhcp-server

  - hostname: FS01
    ip: 10.50.0.20
    cpus: 2
    memory_mb: 2048
    roles:
      - domain-member
      - file-server

organizational_units:
  - name: Brukere
    children:
      - Tjeneste
      - Vanlig
  - name: Servere
  - name: Klienter
  - name: Grupper

security_groups:
  - name: g_fileshare_read
    ou: Grupper
    scope: Global
  - name: g_fileshare_write
    ou: Grupper
    scope: Global

users:
  - username: ola.nordmann
    given_name: Ola
    surname: Nordmann
    ou: Brukere/Vanlig
    initial_password: "Velkommen2026!"
    must_change_password: true
    groups:
      - g_fileshare_read

  - username: kari.hansen
    given_name: Kari
    surname: Hansen
    ou: Brukere/Vanlig
    initial_password: "Velkommen2026!"
    must_change_password: true
    groups:
      - g_fileshare_write

gpo:
  - name: "Baseline-Passord-NSM"
    target_ou: ""
    settings:
      min_password_length: 14
      password_history: 24
      max_password_age_days: 365
      lockout_threshold: 5
      lockout_duration_minutes: 15
