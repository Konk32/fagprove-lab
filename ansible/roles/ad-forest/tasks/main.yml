---

- name: "Installer AD DS-rolle"
  ansible.windows.win_feature:
    name:
      - AD-Domain-Services
      - DNS
      - RSAT-AD-PowerShell
      - RSAT-DNS-Server
    state: present
    include_management_tools: true
  register: ad_install

- name: "Reboot etter feature-installasjon (hvis pakrevd)"
  ansible.windows.win_reboot:
    reboot_timeout: 900
  when: ad_install.reboot_required

- name: "Promoter til ny AD-forest"
  microsoft.ad.domain:
    dns_domain_name: "{{ lab.domain.fqdn }}"
    domain_netbios_name: "{{ lab.domain.netbios }}"
    safe_mode_password: "{{ lab.domain.safe_mode_password }}"
    install_dns: true
    reboot: true
  register: dc_promo

- name: "Vent til AD er ferdig oppe"
  ansible.builtin.pause:
    seconds: 30

- name: "Verifiser at NTDS-tjenesten kjorer"
  ansible.windows.win_service:
    name: NTDS
    state: started
  register: ntds_status

- name: "Verifiser at DNS-tjenesten kjorer"
  ansible.windows.win_service:
    name: DNS
    state: started

- name: "Sjekk forest-info"
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $forest = Get-ADForest
    Write-Output "Forest: $($forest.Name)"
    Write-Output "Mode:   $($forest.ForestMode)"
    Write-Output "DCs:    $($forest.GlobalCatalogs -join ', ')"
  register: forest_info
  changed_when: false

- name: "Vis forest-status"
  ansible.builtin.debug:
    msg: "{{ forest_info.stdout_lines }}"

- name: "Konfigurer DC til a synke tid med ekstern NTP"
  ansible.windows.win_shell: |
    w32tm /config /computer:{{ inventory_hostname }} /manualpeerlist:"time.cloudflare.com,0x9" /syncfromflags:manual /reliable:yes /update
    Restart-Service w32time
    w32tm /resync /force
  changed_when: false
