---
# =============================================================================
# roles/gpo-baseline/tasks/main.yml
# =============================================================================
# Oppretter GPO-er fra lab.yml. Bruker PowerShell direkte fordi
# microsoft.ad-collection ikke har GPO-modul.
#
# Default Domain Policy redigeres for grunnleggende passordpolicy
# fordi den er linket til domain-root og pavirker alle brukere.
# =============================================================================

- name: "Konfigurer passordpolicy via Default Domain Policy"
  ansible.windows.win_shell: |
    $minLen     = {{ lab.gpo[0].settings.min_password_length }}
    $history    = {{ lab.gpo[0].settings.password_history }}
    $maxAge     = {{ lab.gpo[0].settings.max_password_age_days }}
    $lockout    = {{ lab.gpo[0].settings.lockout_threshold }}
    $lockMin    = {{ lab.gpo[0].settings.lockout_duration_minutes }}

    # Bruker net accounts som er enkleste mate a sette domain-passord-policy
    net accounts /minpwlen:$minLen
    net accounts /uniquepw:$history
    net accounts /maxpwage:$maxAge
    net accounts /lockoutthreshold:$lockout
    net accounts /lockoutduration:$lockMin
    net accounts /lockoutwindow:$lockMin
  register: pwpolicy
  changed_when: false

- name: "Verifiser passordpolicy"
  ansible.windows.win_shell: |
    net accounts /domain
  register: policy_status
  changed_when: false

- name: "Vis passordpolicy"
  ansible.builtin.debug:
    msg: "{{ policy_status.stdout_lines }}"

- name: "Force gpupdate pa DC"
  ansible.windows.win_shell: |
    gpupdate /force
  changed_when: false
