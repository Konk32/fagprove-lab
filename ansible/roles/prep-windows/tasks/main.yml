---
# =============================================================================
# roles/prep-windows/tasks/main.yml
# =============================================================================
# Forste rolle som kjorer mot alle Windows-servere ETTER de er klonet.
# Forutsetninger:
#   - VM bootet og fullforte specialize-pass (hostname satt via unattend.xml)
#   - WinRM lytter pa 5985
#   - Vi kommer inn som Administrator med Packer2024!-passordet
#
# Hva denne rollen gjor:
#   - Verifiserer hostname matcher inventory_hostname
#   - Setter NTP-synk (kritisk for AD: Kerberos krever <5 min skew)
#   - Sletter eventuelle stranded sysprep-flag
#   - Sjekker at nettverk er Private (ikke Public)
# =============================================================================

- name: "Hent hostname fra Windows"
  ansible.windows.win_powershell:
    script: $env:COMPUTERNAME
  register: actual_hostname

- name: "Verifiser hostname matcher inventory"
  ansible.builtin.assert:
    that:
      - actual_hostname.output[0] | upper == inventory_hostname | upper
    fail_msg: >
      Hostname mismatch!
      Windows sier: {{ actual_hostname.output[0] }}
      Inventory sier: {{ inventory_hostname }}
      Sjekk at unattend.xml ble lest under specialize-pass.

- name: "Sett tidssone til W. Europe Standard Time"
  ansible.windows.win_timezone:
    timezone: W. Europe Standard Time

- name: "Konfigurer NTP-server (kritisk for AD/Kerberos)"
  # Bruker time.cloudflare.com som er stabil og raskt fra Norge.
  # Bytter til intern NTP nar AD er promotert.
  ansible.windows.win_shell: |
    w32tm /config /manualpeerlist:"time.cloudflare.com,0x9" /syncfromflags:manual /reliable:yes /update
    Restart-Service w32time
    w32tm /resync /force
  changed_when: false  # idempotent — ingen detekterbar endring i state

- name: "Sett nettverksprofil til Private (forutsetning for WinRM/AD)"
  ansible.windows.win_powershell:
    script: |
      Get-NetConnectionProfile | Where-Object { $_.NetworkCategory -ne 'Domain' } |
        Set-NetConnectionProfile -NetworkCategory Private

- name: "Disable IPv6 (sjeldent brukt i lab, forenkler feilsoking)"
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip6\Parameters
    name: DisabledComponents
    data: 0xFF
    type: dword
  notify: reboot if needed

- name: "Sett DNS suffix-search-list"
  # Sorger for at korte navn (f.eks 'dc01' istedenfor 'dc01.corp.lab.local') resolver.
  ansible.windows.win_powershell:
    script: |
      Set-DnsClientGlobalSetting -SuffixSearchList @('{{ lab.domain.fqdn }}')

- name: "Verifiser tidssync er ok (sluttsjekk)"
  ansible.windows.win_shell: w32tm /query /status
  register: ntp_status
  changed_when: false

- name: "Vis NTP-status"
  ansible.builtin.debug:
    msg: "{{ ntp_status.stdout_lines }}"
