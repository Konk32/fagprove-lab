---
# =============================================================================
# roles/prep-windows/tasks/main.yml
# =============================================================================
# Forberedelse av Windows-host etter cloning. Kjorer mot ALLE Windows-hosts.
#
# NTP-strategi for isolert AD-lab:
#   - DC01:  Autoritativ tidskilde. Bruker Local CMOS hvis VMware Tools ikke
#            kan sync med host, ellers host-sync via VMware Tools.
#   - FS01:  Synker med domain hierarchy (DC01 automatisk).
# =============================================================================

- name: "Hent hostname fra Windows"
  ansible.windows.win_powershell:
    script: $env:COMPUTERNAME
  register: actual_hostname

- name: "Verifiser hostname matcher inventory"
  ansible.builtin.assert:
    that:
      - actual_hostname.output[0] | upper == inventory_hostname | upper
    fail_msg: >
      Hostname mismatch!
      Windows sier: {{ actual_hostname.output[0] }}
      Inventory sier: {{ inventory_hostname }}

- name: "Sett tidssone til W. Europe Standard Time"
  ansible.windows.win_timezone:
    timezone: W. Europe Standard Time

# -----------------------------------------------------------------------------
# NTP-konfig avhengig av rolle
# -----------------------------------------------------------------------------

- name: "Sjekk om hosten er en domain controller"
  ansible.builtin.set_fact:
    is_dc: "{{ 'domain_controllers' in group_names }}"

- name: "Konfigurer DC01 som autoritativ tidskilde"
  # DC01 er roten av tidshierarkiet. I isolert lab er Local CMOS akseptabelt
  # som tidsreferanse - alle andre VM-er synker med DC01 uansett.
  # Hvis VMware Tools er installert + host-sync er aktivert, far DC01 ekte tid
  # fra Workstation-hosten.
  ansible.windows.win_shell: |
    # Sett DC01 som autoritativ - bruker Local CMOS som fallback
    w32tm /config /manualpeerlist:"" /syncfromflags:NO /reliable:YES /update
    Restart-Service w32time -ErrorAction SilentlyContinue
    Start-Sleep -Seconds 3
    w32tm /resync /rediscover /nowait
  when: is_dc
  changed_when: false

- name: "Konfigurer member servers til a synke med domain hierarchy"
  # Member servers synker med DC01 automatisk via Kerberos-domenehierarki.
  # Dette er Windows-default for domain-medlemmer.
  ansible.windows.win_shell: |
    w32tm /config /syncfromflags:domhier /update
    Restart-Service w32time -ErrorAction SilentlyContinue
    Start-Sleep -Seconds 3
    w32tm /resync /rediscover /nowait
  when: not is_dc
  changed_when: false

# -----------------------------------------------------------------------------
# Resten av rollen som for
# -----------------------------------------------------------------------------

- name: "Sett nettverksprofil til Private (forutsetning for WinRM/AD)"
  ansible.windows.win_powershell:
    script: |
      Get-NetConnectionProfile | Where-Object { $_.NetworkCategory -ne 'Domain' } |
        Set-NetConnectionProfile -NetworkCategory Private

- name: "Disable IPv6 (sjeldent brukt i lab, forenkler feilsoking)"
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip6\Parameters
    name: DisabledComponents
    data: 0xFF
    type: dword
  notify: reboot if needed

- name: "Sett DNS suffix-search-list"
  ansible.windows.win_powershell:
    script: |
      Set-DnsClientGlobalSetting -SuffixSearchList @('{{ lab.domain.fqdn }}')

- name: "Verifiser tidssync er ok (sluttsjekk)"
  ansible.windows.win_shell: w32tm /query /status
  register: ntp_status
  changed_when: false

- name: "Vis NTP-status"
  ansible.builtin.debug:
    msg: "{{ ntp_status.stdout_lines }}"
