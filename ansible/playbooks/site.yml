---
# =============================================================================
# site.yml — Hovedplaybook for AD/DHCP/GPO-deployment
# =============================================================================
# Forutsetter:
#   - VM-er klonet med scripts/clone-vms.ps1
#   - WinRM tilgjengelig pa hver host
#   - ansible/inventory/hosts.yml generert med generate-inventory.py
#
# Kjor med:
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/site.yml
# =============================================================================

# -----------------------------------------------------------------------------
# Play 1: Felles forberedelse av alle Windows-hosts
# -----------------------------------------------------------------------------
- name: "Forberedelse — alle Windows-servere"
  hosts: windows
  gather_facts: yes
  roles:
    - prep-windows

# -----------------------------------------------------------------------------
# Play 2: Promoter forste DC og opprett forest
# -----------------------------------------------------------------------------
- name: "Bygg AD-forest pa DC01"
  hosts: domain_controllers
  gather_facts: yes
  roles:
    - ad-forest

# -----------------------------------------------------------------------------
# Play 3+: Kommer i senere batches
# -----------------------------------------------------------------------------
# - dhcp-server  (scope fra lab.yml)
# - domain-member (FS01 joiner domain)
# - ou-structure
# - security-groups
# - users-from-config
# - gpo-baseline
