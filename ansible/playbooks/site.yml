---
# Main deployment playbook.
# Run with:
# ansible-playbook -i inventory/hosts.yml playbooks/site.yml
#
# config/lab.yml is loaded with vars_files per play because group_vars can be
# ignored on NTFS-mounted paths in WSL due to Ansible security checks.

- name: "Preparation - all Windows servers"
  hosts: windows
  gather_facts: yes
  vars_files:
    - ../../config/lab.yml
  vars:
    lab:
      domain:
        fqdn: "{{ domain.fqdn }}"
        netbios: "{{ domain.netbios }}"
        safe_mode_password: "{{ domain.safe_mode_password }}"
      local_admin: "{{ local_admin }}"
      network: "{{ network }}"
      dhcp: "{{ dhcp }}"
      organizational_units: "{{ organizational_units }}"
      security_groups: "{{ security_groups }}"
      users: "{{ users }}"
      gpo: "{{ gpo }}"
  roles:
    - prep-windows

- name: "Create AD forest on first domain controller"
  hosts: domain_controllers
  gather_facts: yes
  vars_files:
    - ../../config/lab.yml
  vars:
    lab:
      domain:
        fqdn: "{{ domain.fqdn }}"
        netbios: "{{ domain.netbios }}"
        safe_mode_password: "{{ domain.safe_mode_password }}"
      local_admin: "{{ local_admin }}"
      network: "{{ network }}"
      dhcp: "{{ dhcp }}"
      organizational_units: "{{ organizational_units }}"
      security_groups: "{{ security_groups }}"
      users: "{{ users }}"
      gpo: "{{ gpo }}"
  roles:
    - ad-forest

- name: "Domain-join member servers"
  hosts: member_servers
  gather_facts: no
  vars_files:
    - ../../config/lab.yml
  vars:
    lab:
      domain:
        fqdn: "{{ domain.fqdn }}"
        netbios: "{{ domain.netbios }}"
        safe_mode_password: "{{ domain.safe_mode_password }}"
      local_admin: "{{ local_admin }}"
  roles:
    - domain-member

- name: "AD objects and DHCP"
  hosts: domain_controllers
  gather_facts: no
  vars_files:
    - ../../config/lab.yml
  vars:
    lab:
      domain:
        fqdn: "{{ domain.fqdn }}"
        netbios: "{{ domain.netbios }}"
        safe_mode_password: "{{ domain.safe_mode_password }}"
      local_admin: "{{ local_admin }}"
      network: "{{ network }}"
      dhcp: "{{ dhcp }}"
      organizational_units: "{{ organizational_units }}"
      security_groups: "{{ security_groups }}"
      users: "{{ users }}"
      gpo: "{{ gpo }}"
  roles:
    - ou-structure
    - security-groups
    - users-from-config
    - dhcp-server
    - gpo-baseline
