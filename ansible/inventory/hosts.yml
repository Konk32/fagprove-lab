---
# =============================================================================
# inventory/hosts.yml — Ansible-inventory
# =============================================================================
# Forteller Ansible hvilke maskiner som finnes og hvordan de skal kontaktes.
#
# Pa sikt skal denne genereres automatisk fra config/lab.yml av et
# Python-script (scripts/generate-inventory.py). Forelopig: manuelt vedlikehold.
# =============================================================================

all:
  children:
    # -------------------------------------------------------------------------
    # 'windows' = alle Windows-maskiner. Brukes for felles tasks som
    # hostname, NTP osv.
    # -------------------------------------------------------------------------
    windows:
      vars:
        # WinRM connection-detaljer. Disse leses av Ansible nar den prover
        # a koble seg til hver host.
        ansible_connection: winrm
        ansible_winrm_transport: basic
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5985
        # MERK: I ekte miljo skal dette vaere kerberos + HTTPS med intern CA.
        # Sjekk docs/security.md for produksjons-pattern.
        ansible_user: Administrator
        ansible_password: "{{ vault_admin_password }}"  # fra ansible-vault

      children:
        # ---------------------------------------------------------------------
        # Domain Controllers — promotert til DC av ad-forest-rollen
        # ---------------------------------------------------------------------
        domain_controllers:
          hosts:
            dc01:
              ansible_host: 10.50.0.10

        # ---------------------------------------------------------------------
        # Member servers — joines til domenet etter at DC er oppe
        # ---------------------------------------------------------------------
        member_servers:
          hosts:
            fs01:
              ansible_host: 10.50.0.20
              # Roller fra config/lab.yml mappes til Ansible-tags
              server_roles:
                - file-server
